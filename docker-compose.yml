services:
  backend:
    build: ./backend
    environment:
      - HF_HOME=/models
      - MAX_UPLOAD_MB=50
    # Persist downloaded models across container recreation.
    volumes:
      - models:/models
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  models:
